<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#b5601a">
  <meta name="description" content="한국 주식시장 뉴스 레이더 — RSS 자동 수집, 종목 감지, 노이즈 필터링">
  <title>모닝 브리프 — 시장 레이더</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════ HEADER ══════════════════ -->
<header class="header">
  <div class="logo">
    <div class="logo-mark">MB</div>
    <div>
      <div class="logo-title">
        모닝 브리프
        <span class="version-pill"><span class="live-dot"></span>v4.0.0</span>
      </div>
      <div class="logo-sub">시장 레이더 — Vercel Edition</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock-wrap">
      <div class="clock-badges">
        <span class="day-pill" id="day-pill"></span>
        <span class="mkt-pill" id="mkt-pill"></span>
      </div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-time" id="clock-time"></div>
    </div>
    <button class="panel-btn" onclick="toggleSidebar()">☰ 설정</button>
  </div>
</header>

<!-- ══════════════════ LAYOUT ══════════════════ -->
<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">

    <!-- 소스 선택 -->
    <div class="sb-section">
      <div class="sb-label">📡 뉴스 소스</div>
      <div class="api-card">

        <!-- 서버 상태 -->
        <div class="srv-status" id="srv-status">
          <span class="srv-dot"></span>
          <span id="srv-msg">서버 확인 중...</span>
        </div>

        <div class="src-group-lbl">경제 전문지</div>
        <div class="src-list">
          <label class="src-item"><input type="checkbox" value="hankyung" checked><span>📊 한국경제</span><span class="src-cnt" id="cnt-hankyung">-</span></label>
          <label class="src-item"><input type="checkbox" value="mk"       checked><span>💼 매일경제</span><span class="src-cnt" id="cnt-mk">-</span></label>
          <label class="src-item"><input type="checkbox" value="edaily"   checked><span>📡 이데일리</span><span class="src-cnt" id="cnt-edaily">-</span></label>
          <label class="src-item"><input type="checkbox" value="yonhap"   checked><span>🔔 연합뉴스</span><span class="src-cnt" id="cnt-yonhap">-</span></label>
          <label class="src-item"><input type="checkbox" value="biz"            ><span>📰 조선비즈</span><span class="src-cnt" id="cnt-biz">-</span></label>
          <label class="src-item"><input type="checkbox" value="sedaily"        ><span>🏭 서울경제</span><span class="src-cnt" id="cnt-sedaily">-</span></label>
          <label class="src-item"><input type="checkbox" value="etnews"         ><span>💻 전자신문</span><span class="src-cnt" id="cnt-etnews">-</span></label>
        </div>

        <div class="src-group-lbl" style="margin-top:10px">전 카테고리 <span style="font-weight:400;color:var(--text3)">(노이즈 탐지)</span></div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:7px;line-height:1.5">정치·사회·연예 뉴스에서 주가 영향 재료 자동 감지</div>
        <div class="src-list">
          <label class="src-item"><input type="checkbox" value="yonhap_all"><span>🌐 연합(전체)</span><span class="src-cnt" id="cnt-yonhap_all">-</span></label>
          <label class="src-item"><input type="checkbox" value="chosun"    ><span>📄 조선일보</span><span class="src-cnt" id="cnt-chosun">-</span></label>
          <label class="src-item"><input type="checkbox" value="joongang"  ><span>📄 중앙일보</span><span class="src-cnt" id="cnt-joongang">-</span></label>
          <label class="src-item"><input type="checkbox" value="donga"     ><span>📄 동아일보</span><span class="src-cnt" id="cnt-donga">-</span></label>
          <label class="src-item"><input type="checkbox" value="kbs"       ><span>📺 KBS</span><span class="src-cnt" id="cnt-kbs">-</span></label>
          <label class="src-item"><input type="checkbox" value="mbc"       ><span>📺 MBC</span><span class="src-cnt" id="cnt-mbc">-</span></label>
          <label class="src-item"><input type="checkbox" value="sbs"       ><span>📺 SBS</span><span class="src-cnt" id="cnt-sbs">-</span></label>
        </div>

        <button class="btn-run" id="run-btn" onclick="fetchAllNews()">🔍 뉴스 검색</button>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
          <div class="progress-msg" id="prog-msg">대기 중...</div>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="sb-section">
      <div class="sb-label">📊 분석 통계</div>
      <div class="stats-grid">
        <div class="stat-card"><span class="stat-num" id="st-total">0</span><span class="stat-lbl">총 뉴스</span></div>
        <div class="stat-card"><span class="stat-num" id="st-group"  style="color:var(--purple)">0</span><span class="stat-lbl">중복 그룹</span></div>
        <div class="stat-card"><span class="stat-num" id="st-pos"    style="color:var(--green)">0</span><span class="stat-lbl">긍정 신호</span></div>
        <div class="stat-card"><span class="stat-num" id="st-neg"    style="color:var(--red)">0</span><span class="stat-lbl">부정 신호</span></div>
        <div class="stat-card"><span class="stat-num" id="st-ticker" style="color:var(--blue)">0</span><span class="stat-lbl">종목 감지</span></div>
        <div class="stat-card"><span class="stat-num" id="st-noise"  style="color:var(--orange)">0</span><span class="stat-lbl">노이즈 경고</span></div>
      </div>
    </div>

    <!-- 섹터 필터 -->
    <div class="sb-section">
      <div class="sb-label">🗂 섹터 필터</div>
      <div class="sector-list" id="sector-list">
        <div style="font-size:10px;color:var(--text3);padding:6px 4px;font-family:'JetBrains Mono',monospace">검색 후 표시됩니다</div>
      </div>
    </div>

  </aside>

  <!-- ── MAIN ── -->
  <main class="main">
    <div class="main-hd">
      <div class="main-title">시장 레이더</div>
      <div class="main-sub" id="main-sub">소스를 선택하고 뉴스 검색을 눌러주세요</div>
    </div>
    <div class="filter-bar" id="filter-bar" style="display:none"></div>
    <div id="fail-wrap" style="display:none"></div>
    <div class="news-grid" id="news-grid">
      <div class="empty-state">
        <div class="empty-icon">📡</div>
        <div class="empty-text">뉴스를 불러오지 않았습니다</div>
        <div class="empty-sub">좌측에서 소스를 선택하고 검색하세요</div>
      </div>
    </div>
  </main>

</div>

<div class="toast" id="toast"></div>

<!-- ① 분석 함수 먼저, ② UI 로직은 그 다음 -->
<script src="js/analyzer.js"></script>
<script src="js/main.js"></script>
</body>
</html>
